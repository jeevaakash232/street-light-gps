<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxEgiyF_xn1FP09MznNRZ-Szn4jlo61cC3fYwreLsMsTF2hYzntyC1Rhs-ODDQCzmSP/exec";

function sendLocation(lat, lng) {
  const url = `${WEB_APP_URL}?phonelat=${lat}&phonelng=${lng}&t=${Date.now()}`;

  fetch(url, {
    method: "GET",
    mode: "no-cors"
  })
  .then(() => {
    document.getElementById("status").innerText =
      `✅ Sent: ${lat}, ${lng}`;
  })
  .catch(err => {
    document.getElementById("status").innerText =
      "❌ Error: " + err;
  });
}
</script>
